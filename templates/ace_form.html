<h1>{{ title }}</h1>
<form method="post">
    <div>
        {{ form.name.label }}: {{ form.name() }}
        {% if form.name.errors %}<span style="color:red">{{ form.name.errors[0] }}</span>{% endif %}
    </div>
    <div>
        {{ form.hash.label }}: {{ form.hash() }}
        {% if form.hash.errors %}<span style="color:red">{{ form.hash.errors[0] }}</span>{% endif %}
    </div>
    <button type="submit">Save</button>
</form>
<a href="{{ app_prefix }}/admin/ace">Back</a>
